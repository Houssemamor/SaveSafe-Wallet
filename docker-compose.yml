networks:
  ssw-network:
    driver: bridge

volumes:
  redis_data:
  kafka_data:
  grafana_data:
  loki_data:

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: docker.io/redis:7-alpine
    container_name: ssw-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ssw_redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ssw_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:7.6.0
    container_name: ssw-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Apache Kafka ────────────────────────────────────────────────────────────
  kafka:
    image: docker.io/confluentinc/cp-kafka:7.6.0
    container_name: ssw-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Loki ────────────────────────────────────────────────────────────────────
  loki:
    image: docker.io/grafana/loki:2.9.0
    container_name: ssw-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: docker.io/grafana/grafana:10.2.0
    container_name: ssw-grafana
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./src/AuthService
      dockerfile: AuthService.API/Dockerfile
    container_name: ssw-auth-service
    depends_on:
      redis:
        condition: service_healthy
      wallet-service:
        condition: service_started
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-ssw_redis_secret}"
      Firestore__ProjectId: ${FIRESTORE_PROJECT_ID}
      Firestore__CredentialsPath: /secrets/firebase.json
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/firebase.json
      Jwt__Key: ${JWT_SECRET_KEY}
      Jwt__Issuer: savesafe-auth
      Jwt__Audience: savesafe-clients
      Services__WalletServiceUrl: http://wallet-service:8080
      InternalApi__ApiKey: ${INTERNAL_API_KEY}
      DefaultAdmin__Email: ${DEFAULT_ADMIN_EMAIL}
      DefaultAdmin__Name: ${DEFAULT_ADMIN_NAME}
      DefaultAdmin__Password: ${DEFAULT_ADMIN_PASSWORD}
      RateLimit__PerMinute: ${RATE_LIMIT_PER_MINUTE:-100}
      RateLimit__PerHour: ${RATE_LIMIT_PER_HOUR:-1000}
    volumes:
      - ${FIRESTORE_CREDENTIALS_PATH:-./secrets/firebase.json}:/secrets/firebase.json:ro
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Wallet Service ───────────────────────────────────────────────────────────
  wallet-service:
    build:
      context: ./src/WalletService
      dockerfile: WalletService.API/Dockerfile
    container_name: ssw-wallet-service
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Firestore__ProjectId: ${FIRESTORE_PROJECT_ID}
      Firestore__CredentialsPath: /secrets/firebase.json
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/firebase.json
      Jwt__Key: ${JWT_SECRET_KEY}
      Jwt__Issuer: savesafe-auth
      Jwt__Audience: savesafe-clients
      InternalApi__ApiKey: ${INTERNAL_API_KEY}
      RateLimit__PerMinute: ${RATE_LIMIT_PER_MINUTE:-100}
      RateLimit__PerHour: ${RATE_LIMIT_PER_HOUR:-1000}
    volumes:
      - ${FIRESTORE_CREDENTIALS_PATH:-./secrets/firebase.json}:/secrets/firebase.json:ro
    networks:
      - ssw-network
    restart: unless-stopped

  # ── Frontend (Angular + Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: ssw-frontend
    depends_on:
      auth-service:
        condition: service_started
      wallet-service:
        condition: service_started
    ports:
      - "4200:80"
    networks:
      - ssw-network
    restart: unless-stopped
